name: Collect

on:
  workflow_dispatch:   # только вручную: Actions → Collect → Run workflow

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Сбор контактов
        run: python scripts/collect.py

      - name: Сохранить базу
        run: |
          git config user.name "fpv-bot"
          git config user.email "fpv@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || (git commit -m "collect: $(date -u +%F_%H:%M)" && git pull --rebase && git push)
