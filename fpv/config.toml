# Ловец-FPV — конфиг. Правится прямо на GitHub (файл → карандаш → commit).

[bot]
daily_leads      = 1         # ⚙️ временно 1 на период отладки; рабочее значение — 3
lead_hour_msk    = 10        # порция дня выдаётся при первом запуске после этого часа
active_hours_msk = [9, 22]   # вне этих часов (МСК) запуск сразу выходит

[kp]
# ⚠️ Тестовый запуск на данных SAF — перед передачей коллеге заменить на его
portfolio_url = "https://safonovich.github.io/lovec-fpv/"
author_name   = "Егор Сафонович"
author_phone  = "+7 909 676-69-91"
subject       = "FPV-видеотур для объектов {agency}"

# Форматы и цены — Claude выбирает 1-2 подходящих под агентство.
# Внутренний прайс (для справки): FPV O4 55к · Action5/GoPro 60к · BMD micro g2 120к
# Mavic 4 70к · Mavic 3 60к · Mini 5 50к · Inspire 3 140к — всё за смену.
prices = """— FPV-видеотур (4K): пролёт одним кадром — фасад, все комнаты, участок, вид на район — от 55 000 ₽ за съёмочный день
— FPV кино-уровня (Blackmagic): картинка как в рекламе застройщиков — для флагманских и имиджевых объектов — от 120 000 ₽
— Классический дрон: панорамы объекта, участка и района с высоты — от 50 000 ₽"""

# Оплата. В письмах — одна строка. Крипту в КП НЕ упоминаем (внутреннее
# правило: если клиент сам просит крипту — можно, решается в переговорах).
payment = "Оплата — наличный или безналичный расчёт; работа по договору (ИП) +10% к стоимости."

# Шаблон-запаска: используется, если Claude API не подключён/недоступен
template = """Здравствуйте!

Меня зовут {author}, снимаю недвижимость FPV-дроном: один динамичный
кадр — фасад, все комнаты, участок и вид на район, без склеек. Такой
видеотур выделяет объявление среди сотен похожих и приводит больше
показов — особенно по домам и премиум-объектам.

Примеры работ: {portfolio}

Форматы:
{prices}

{payment}

Точный расчёт делаю под конкретный объект — достаточно прислать адрес
и пару фото.

{author}
{phone}"""

[llm]
enabled  = true              # персонализация КП + черновики ответов
provider = "openai"          # "openai" = OpenRouter, Grok/xAI, DeepSeek, LM Studio · "anthropic" = Claude
api_base = "https://openrouter.ai/api/v1"   # xAI: https://api.x.ai/v1 · DeepSeek: https://api.deepseek.com/v1
model    = "qwen/qwen3-next-80b-a3b-instruct:free"   # бесплатная на OpenRouter; xAI: grok-4.3 · Claude: claude-haiku-4-5
# ключ — в секрете GitHub LLM_API_KEY (openrouter.ai → Keys)

[email]
enabled   = true
smtp_host = "smtp.gmail.com"   # тест на safpelerin@gmail.com; для Яндекса: smtp.yandex.ru
smtp_port = 465
imap_host = "imap.gmail.com"   # чтение ответов агентств; для Яндекса: imap.yandex.ru
# логин/пароль приложения — в секретах GitHub: SMTP_USER, SMTP_PASS

[negotiation]
enabled = true   # ответы агентств: Claude готовит черновик, отправка по кнопке в TG

[followup]
enabled    = true
after_days = 4   # нет ответа N дней → одно вежливое напоминание (уходит само)
template = """Здравствуйте!

Несколько дней назад отправлял предложение по FPV-видеотурам для объектов
{agency} — на случай, если письмо затерялось, коротко продублирую:
снимаю недвижимость пролётом одним кадром, примеры и цены здесь: {portfolio}

Если тема актуальна — пришлите адрес любого объекта, посчитаю стоимость
в тот же день. Если нет — просто не отвечайте, больше не потревожу.

{author}
{phone}"""
