name: Discover

on:
  schedule:
    - cron: "0 5 * * 1"   # каждый понедельник 08:00 МСК
  workflow_dispatch:       # и вручную: Actions → Discover → Run workflow

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Поиск новых агентств (OpenStreetMap)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/discover.py

      - name: Сохранить базу
        run: |
          git config user.name "fpv-bot"
          git config user.email "fpv@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || (git commit -m "discover: $(date -u +%F_%H:%M)" && git pull --rebase && git push)
